name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          include-prerelease: true

      - name: Get build date
        id: date
        shell: pwsh
        run: '"value=" + (Get-Date -Format "yyyy-MM-dd") | Out-File -FilePath $env:GITHUB_OUTPUT -Append'

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish Source/Lens.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:BuildDate=${{ steps.date.outputs.value }} `
            --output publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lens ${{ steps.version.outputs.version }}"
          files: publish/Lens.exe
          generate_release_notes: true
